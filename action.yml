# GitHub Action: Check LLM model deprecations in your repo
# Use: techdevsynergy/llm-model-deprecation@v1

name: "LLM Model Deprecation Check"
description: "Scan the repository for deprecated or retired LLM model references (OpenAI, Anthropic, etc.)"
branding:
  icon: "alert-triangle"
  color: "yellow"

inputs:
  path:
    description: "Path to project root to scan (relative to repo root)"
    required: false
    default: "."
  fail-on-deprecated:
    description: "Set to true to fail the job when deprecated/retired models are found (CI)"
    required: false
    default: "false"
  version:
    description: "Pin llm-model-deprecation version (e.g. 1.0.0). Omit for latest."
    required: false
    default: ""

outputs:
  report:
    description: "Scan output (findings text). Use for Slack, job summary, or logs."
    value: ${{ steps.deprecation.outputs.report }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install llm-model-deprecation
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          pip install llm-model-deprecation==${{ inputs.version }}
        else
          pip install llm-model-deprecation
        fi

    - name: Check LLM deprecations
      id: deprecation
      shell: bash
      run: |
        set -o pipefail
        if [ "${{ inputs.fail-on-deprecated }}" = "true" ]; then
          llm-deprecation scan "${{ inputs.path }}" --fail-on-deprecated 2>&1 | tee report.txt
        else
          llm-deprecation scan "${{ inputs.path }}" 2>&1 | tee report.txt
        fi
        scan_exit=${PIPESTATUS[0]}
        echo "report<<EOF" >> $GITHUB_OUTPUT
        cat report.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        exit $scan_exit
